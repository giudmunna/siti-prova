<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Sirio Fit &amp; Dance - Hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="0.55" stop-color="#11112b"/>
      <stop offset="1" stop-color="#2a0b0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="30%" r="55%">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g opacity="0.55">
    <path d="M-60 760 C 260 610, 380 930, 760 780 S 1240 640, 1700 820" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <path d="M-70 815 C 240 650, 420 970, 780 820 S 1260 690, 1690 860" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="10"/>
  </g>

  <g filter="url(#soft)" opacity="0.9">
    <circle cx="420" cy="330" r="140" fill="#dc2626" opacity="0.18"/>
    <circle cx="1180" cy="460" r="190" fill="#991b1b" opacity="0.16"/>
  </g>

  <g opacity="0.12" fill="#ffffff">
    <circle cx="170" cy="140" r="3"/><circle cx="250" cy="210" r="2"/><circle cx="320" cy="120" r="2"/>
    <circle cx="1430" cy="160" r="3"/><circle cx="1320" cy="260" r="2"/><circle cx="1470" cy="290" r="2"/>
    <circle cx="980" cy="120" r="2"/><circle cx="1100" cy="190" r="2"/><circle cx="1020" cy="240" r="3"/>
  </g>

  <g font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="120" y="740" fill="#ffffff" opacity="0.22" font-size="150" font-weight="700" letter-spacing="6">SIRIO</text>
    <rect x="120" y="775" width="280" height="10" rx="5" fill="url(#accent)" opacity="0.75"/>
    <text x="420" y="785" fill="#ffffff" opacity="0.55" font-size="28" font-weight="600">Fit &amp; Dance " Alcamo</text>
  </g>
</svg>
